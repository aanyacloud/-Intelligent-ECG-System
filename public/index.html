<script>
async function analyze() {
    const raw = document.getElementById("input").value;
    const signal = raw.split(",").map(Number);

    const res = await fetch("/api/index", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            signal: signal,
            fs: 360
        })
    });

    const data = await res.json();

    document.getElementById("output").style.display = "block";

    if (data.error) {
        document.getElementById("results").innerHTML =
            `<p style="color:red;">Error: ${data.error}</p>`;
        return;
    }

    document.getElementById("results").innerHTML = `
        <div class="metric"><b>Average HR:</b> ${data.avg_hr?.toFixed(2) || 0} BPM</div>
        <div class="metric"><b>SNR:</b> ${data.snr?.toFixed(2) || 0} dB</div>
        <div class="metric"><b>SQI:</b> ${data.sqi?.toFixed(2) || 0}</div>
        <div class="metric"><b>Confidence:</b> ${data.confidence?.toFixed(2) || 0} %</div>
        <div class="metric"><b>Beats Detected:</b> ${data.num_beats || 0}</div>
        <div class="metric"><b>HRV:</b> ${JSON.stringify(data.hrv || {})}</div>
    `;
}
</script>
