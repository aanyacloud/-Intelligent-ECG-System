<!DOCTYPE html>
<html>
<head>
  <title>ECG Dashboard</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#f4f6f9; }
    .app { display:flex; }

    .sidebar {
      width:250px; background:#111827; color:white; padding:20px;
      height:100vh;
    }

    .sidebar button {
      width:100%; padding:10px; margin-top:10px;
      background:#2563eb; border:none; color:white; border-radius:5px;
      cursor:pointer;
    }

    .main { flex:1; padding:20px; }

    .cards { display:flex; gap:15px; flex-wrap:wrap; }
    .card {
      background:white; padding:15px; border-radius:10px;
      width:160px; box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    canvas { margin-top:20px; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App() {
  const [data, setData] = React.useState(null);
  const chartRef = React.useRef(null);

  const runAnalysis = async () => {

    // 🔥 dynamic ECG-like signal
    const signal = Array.from({length: 360}, (_, i) =>
      Math.sin(i/10) + Math.random()*0.2
    );

    try {
      const res = await fetch('/api/index', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          signal: signal,
          fs: 360
        })
      });

      const result = await res.json();
      setData(result);

      // Draw graph
      const ctx = document.getElementById('chart').getContext('2d');
      if (chartRef.current) chartRef.current.destroy();

      chartRef.current = new Chart(ctx, {
        type: 'line',
        data: {
          labels: signal.map((_, i) => i),   // ✅ FIXED
          datasets: [{
            label: 'ECG Signal',
            data: signal,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: { display: true },
            y: { display: true }
          }
        }
      });

    } catch (err) {
      console.error(err);
      alert("API error — check backend");
    }
  };

  return (
    <div className="app">

      {/* Sidebar */}
      <div className="sidebar">
        <h2>ECG System</h2>
        <button onClick={runAnalysis}>Run Analysis</button>
      </div>

      {/* Main */}
      <div className="main">
        <h1>📊 ECG Monitoring Dashboard</h1>

        {!data && <p>Click "Run Analysis" to start</p>}

        {data && (
          <>
            <div className="cards">
              <div className="card">❤️ HR<br/><b>{data.avg_hr.toFixed(2)}</b></div>
              <div className="card">📈 SNR<br/><b>{data.snr.toFixed(2)}</b></div>
              <div className="card">📊 SQI<br/><b>{data.sqi.toFixed(2)}</b></div>
              <div className="card">✅ Conf<br/><b>{data.confidence.toFixed(2)}</b></div>
              <div className="card">🔢 Beats<br/><b>{data.num_beats}</b></div>
            </div>

            <canvas id="chart"></canvas>
          </>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
